name: diabetics_assistant_mobile
description: A premium mobile app for diabetics athlete management.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  google_fonts: ^6.1.0
  flutter_riverpod: ^2.4.9
  fl_chart: ^0.66.0
  intl: ^0.19.0
